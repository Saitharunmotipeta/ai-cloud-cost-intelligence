version: "3.9"

services:

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"

  ingestion-service:
    build:
      context: ../../
      dockerfile: services/ingestion-service/Dockerfile

    container_name: ingestion-service

    ports:
      - "8001:8000"

    env_file:
      - ../../.env.local

    depends_on:
      - redis

  analytics-service:
    build:
      context: ../../
      dockerfile: services/analytics-service/Dockerfile

    container_name: analytics-service

    ports:
      - "8002:8000"

    env_file:
      - ../../.env.local

    depends_on:
      - redis


  storage-service:
    build:
      context: ../../
      dockerfile: services/storage-service/Dockerfile

    container_name: storage-service

    ports:
      - "8003:8000"

    env_file:
      - ../../.env.local

    depends_on:
      - redis


  graphql-gateway:
    build:
      context: ../../
      dockerfile: services/graphql-gateway/Dockerfile

    container_name: graphql-gateway

    ports:
      - "8000:8000"

    env_file:
      - ../../.env.local

    depends_on:
      - analytics-service
      - storage-service