name: CI - Build and Validate

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

jobs:
  frontend-validation:
    name: Frontend Build Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  backend-validation:
    name: Backend Docker Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Docker Compose configuration
        working-directory: infrastructure/docker
        run: docker compose config

      - name: Build backend Docker images
        working-directory: infrastructure/docker
        run: docker compose build

  ci-success:
    name: CI Success
    runs-on: ubuntu-latest

    needs:
      - frontend-validation
      - backend-validation

    steps:
      - name: Confirm CI validation
        run: |
          echo "Frontend validation completed successfully."
          echo "Backend Docker validation completed successfully."
          echo "CI pipeline passed."