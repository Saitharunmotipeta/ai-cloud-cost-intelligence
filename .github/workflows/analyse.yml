name: Analyse Deployment

on:
  workflow_run:
    workflows:
      - CD - Deploy to AWS
    types:
      - completed

permissions:
  contents: write

jobs:
  analyse:

    if: github.event.workflow_run.conclusion == 'success'

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ----------------------------------------------------
      # Export deployment information
      # ----------------------------------------------------

      - name: Export Benchmark Variables
        run: |
          echo "DEPLOYMENT_TIMESTAMP=${{ github.event.workflow_run.updated_at }}" >> $GITHUB_ENV
          echo "COMMIT_SHA=${{ github.event.workflow_run.head_sha }}" >> $GITHUB_ENV
          echo "BRANCH_NAME=${{ github.event.workflow_run.head_branch }}" >> $GITHUB_ENV
          echo "TRIGGERED_BY=${{ github.event.workflow_run.actor.login }}" >> $GITHUB_ENV

          echo "DEPLOYMENT_STATUS=SUCCESS" >> $GITHUB_ENV

          # Populate these later from deploy.yml
          echo "DEPLOYMENT_DURATION_SEC=" >> $GITHUB_ENV
          echo "FRONTEND_BUILD_DURATION_SEC=" >> $GITHUB_ENV
          echo "BACKEND_BUILD_DURATION_SEC=" >> $GITHUB_ENV
          echo "FRONTEND_BUILD_SIZE_KB=" >> $GITHUB_ENV
          echo "CONTAINERS_RUNNING=" >> $GITHUB_ENV
          echo "HEALTH_CHECKS_TOTAL=" >> $GITHUB_ENV
          echo "HEALTH_CHECKS_PASSED=" >> $GITHUB_ENV
          echo "HEALTH_SUCCESS_RATE=" >> $GITHUB_ENV

      # ----------------------------------------------------
      # Benchmark Engine
      # ----------------------------------------------------

      - name: Initialize Benchmark Workspace
        run: |
          python benchmarks/engine/initialize.py

      - name: Append Deployment
        run: |
          python benchmarks/engine/append_deployment.py

      - name: Generate Statistics
        run: |
          python benchmarks/engine/generate_statistics.py

      - name: Generate Benchmark Summary
        run: |
          python benchmarks/engine/generate_summary.py

      # ----------------------------------------------------
      # Commit benchmark artefacts
      # ----------------------------------------------------

      - name: Commit Benchmark Reports
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add benchmarks

          if git diff --cached --quiet; then
            echo "No benchmark changes."
            exit 0
          fi

          git commit -m "benchmarks: update deployment reports [skip ci]"
          git push