name: Analyse Deployment

on:
  workflow_run:
    workflows:
      - CD - Deploy to AWS
    types:
      - completed

permissions:
  contents: write
  actions: read

jobs:
  analyse:

    if: github.event.workflow_run.conclusion == 'success'

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ----------------------------------------
      # Download metrics produced by deploy.yml
      # ----------------------------------------

      - name: Download Benchmark Metrics
        uses: actions/download-artifact@v4
        with:
          name: deployment-metrics
          path: benchmarks
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Verify Download
        run: |
          echo "Downloaded files:"
          ls -R benchmarks

          echo ""
          echo "deployment_metrics.json"
          cat benchmarks/deployment_metrics.json

      # ----------------------------------------
      # Export GitHub metadata
      # ----------------------------------------

      - name: Export Deployment Metadata
        run: |
          echo "DEPLOYMENT_TIMESTAMP=${{ github.event.workflow_run.updated_at }}" >> $GITHUB_ENV
          echo "COMMIT_SHA=${{ github.event.workflow_run.head_sha }}" >> $GITHUB_ENV
          echo "BRANCH_NAME=${{ github.event.workflow_run.head_branch }}" >> $GITHUB_ENV
          echo "TRIGGERED_BY=${{ github.event.workflow_run.actor.login }}" >> $GITHUB_ENV
          echo "DEPLOYMENT_STATUS=SUCCESS" >> $GITHUB_ENV

      # ----------------------------------------
      # Export deployment metrics from JSON
      # ----------------------------------------

      - name: Export Benchmark Metrics
        run: |
          python - <<'PY'
          import json
          import os

          with open("benchmarks/deployment_metrics.json","r") as f:
              metrics = json.load(f)

          with open(os.environ["GITHUB_ENV"],"a") as env:
              env.write(f"DEPLOYMENT_DURATION_SEC={metrics.get('deployment_duration_sec','')}\n")
              env.write(f"FRONTEND_BUILD_DURATION_SEC={metrics.get('frontend_build_duration_sec','')}\n")
              env.write(f"BACKEND_BUILD_DURATION_SEC={metrics.get('backend_build_duration_sec','')}\n")
              env.write(f"FRONTEND_BUILD_SIZE_KB={metrics.get('frontend_build_size_kb','')}\n")
              env.write(f"CONTAINERS_RUNNING={metrics.get('containers_running','')}\n")
              env.write(f"HEALTH_CHECKS_TOTAL={metrics.get('health_checks_total','')}\n")
              env.write(f"HEALTH_CHECKS_PASSED={metrics.get('health_checks_passed','')}\n")
              env.write(f"HEALTH_SUCCESS_RATE={metrics.get('health_success_rate','')}\n")
          PY

      # ----------------------------------------
      # Benchmark Engine
      # ----------------------------------------

      - name: Initialize Benchmark Workspace
        run: python benchmarks/engine/initialize.py

      - name: Append Deployment
        run: python benchmarks/engine/append_deployment.py

      - name: Generate Statistics
        run: python benchmarks/engine/generate_statistics.py

      - name: Generate Benchmark Summary
        run: python benchmarks/engine/generate_summary.py

      # ----------------------------------------
      # Commit benchmark artifacts
      # ----------------------------------------

      - name: Commit Benchmark Reports
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add benchmarks

          if git diff --cached --quiet; then
            echo "No benchmark changes."
            exit 0
          fi

          git commit -m "benchmarks: update deployment reports [skip ci]"
          git push