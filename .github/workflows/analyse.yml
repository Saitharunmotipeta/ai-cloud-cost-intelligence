name: Analyse Deployment

on:
  workflow_run:
    workflows:
      - CD - Deploy to AWS
    types:
      - completed

permissions:
  contents: write

jobs:
  analyse:

    if: github.event.workflow_run.conclusion == 'success'

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Initialize Evidence
        run: |
          mkdir -p docs/evidence

          if [ ! -f docs/evidence/deployment_history.csv ]; then
            echo "timestamp,commit_sha,branch,status" > docs/evidence/deployment_history.csv
          fi

          if [ ! -f docs/evidence/deployment_statistics.json ]; then
            echo "{}" > docs/evidence/deployment_statistics.json
          fi

          if [ ! -f docs/evidence/benchmark_summary.md ]; then
            printf "# Deployment Benchmark Summary\n\nNo benchmark data available.\n" > docs/evidence/benchmark_summary.md
          fi

      - name: Append Deployment Record
        run: |
          echo "${{ github.event.workflow_run.updated_at }},${{ github.event.workflow_run.head_sha }},${{ github.event.workflow_run.head_branch }},SUCCESS" >> docs/evidence/deployment_history.csv

      - name: Commit Evidence
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/evidence

          if git diff --cached --quiet; then
            echo "No evidence changes."
            exit 0
          fi

          git commit -m "docs(evidence): update deployment history [skip ci]"
          git push